name = "drewbs-blog-publisher"
main = "src/index.js"
compatibility_date = "2024-12-01"

[triggers]
# Mon/Wed/Fri at 6:00 UTC
# GMT = 6am local, BST = 7am local (1hr drift accepted)
crons = ["0 6 * * 1,3,5"]

# Environment variables are set via `wrangler secret put` or the Cloudflare dashboard
# Required secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   CLOUDFLARE_DEPLOY_HOOK
#   DISCORD_WEBHOOK_URL
#   MANUAL_TRIGGER_SECRET
